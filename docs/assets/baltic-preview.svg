<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">Baltic theme preview</title>
  <desc id="desc">A preview of the Baltic color theme with editor syntax, terminal colors, and palette swatches.</desc>
  <rect width="1200" height="760" fill="#08141a"/>
  <rect x="48" y="44" width="1104" height="672" rx="18" fill="#101d24" stroke="#1a2b33" stroke-width="2"/>
  <rect x="48" y="44" width="1104" height="64" rx="18" fill="#08141a"/>
  <rect x="48" y="90" width="1104" height="18" fill="#08141a"/>
  <circle cx="82" cy="76" r="8" fill="#c57972"/>
  <circle cx="110" cy="76" r="8" fill="#c9b27a"/>
  <circle cx="138" cy="76" r="8" fill="#97b88b"/>
  <text x="184" y="83" fill="#d1bda3" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="18" font-weight="700">Baltic</text>
  <text x="254" y="83" fill="#9f927f" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="14">cream-forward dark theme</text>

  <rect x="82" y="140" width="660" height="470" rx="12" fill="#08141a" stroke="#1a2b33"/>
  <rect x="82" y="140" width="660" height="42" rx="12" fill="#101d24"/>
  <rect x="82" y="170" width="660" height="12" fill="#101d24"/>
  <text x="110" y="166" fill="#f0eadc" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="14">example.py</text>
  <text x="650" y="166" fill="#9ebdbe" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="13">Python</text>

  <g font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="20">
    <text x="110" y="225" fill="#9f927f">01</text>
    <text x="154" y="225" fill="#d8c8ad" font-weight="700">import</text>
    <text x="232" y="225" fill="#d1bda3"> pathlib</text>

    <text x="110" y="265" fill="#9f927f">02</text>
    <text x="154" y="265" fill="#d8c8ad" font-weight="700">def</text>
    <text x="200" y="265" fill="#9ebdbe"> render_palette</text>
    <text x="380" y="265" fill="#d1bda3">(name):</text>

    <text x="110" y="305" fill="#9f927f">03</text>
    <text x="154" y="305" fill="#9f927f" font-style="italic"># Cream stays readable; accents stay quiet.</text>

    <text x="110" y="345" fill="#9f927f">04</text>
    <text x="154" y="345" fill="#d1bda3">    base = </text>
    <text x="274" y="345" fill="#c9b27a">"#08141a"</text>

    <text x="110" y="385" fill="#9f927f">05</text>
    <text x="154" y="385" fill="#d1bda3">    text = </text>
    <text x="274" y="385" fill="#c9b27a">"#d1bda3"</text>

    <text x="110" y="425" fill="#9f927f">06</text>
    <text x="154" y="425" fill="#d8c8ad" font-weight="700">    return</text>
    <text x="262" y="425" fill="#b8c9c8" font-weight="700"> len</text>
    <text x="312" y="425" fill="#d1bda3">(name), text, base</text>

    <text x="110" y="465" fill="#9f927f">07</text>
    <text x="154" y="465" fill="#b79ab2">VERSION</text>
    <text x="250" y="465" fill="#d1bda3"> = </text>
    <text x="286" y="465" fill="#b79ab2">1</text>

    <text x="110" y="505" fill="#9f927f">08</text>
    <text x="154" y="505" fill="#9ebdbe">render_palette</text>
    <text x="330" y="505" fill="#d1bda3">(</text>
    <text x="344" y="505" fill="#c9b27a">"Baltic"</text>
    <text x="440" y="505" fill="#d1bda3">)</text>
  </g>

  <rect x="782" y="140" width="334" height="178" rx="12" fill="#08141a" stroke="#1a2b33"/>
  <text x="812" y="178" fill="#f0eadc" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="17" font-weight="700">Terminal</text>
  <text x="812" y="214" fill="#d99f6b" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="17">$</text>
  <text x="836" y="214" fill="#d1bda3" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="17">git status</text>
  <text x="812" y="250" fill="#97b88b" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="16">added</text>
  <text x="878" y="250" fill="#c9b27a" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="16">modified</text>
  <text x="974" y="250" fill="#c57972" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="16">deleted</text>
  <text x="812" y="286" fill="#9f927f" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="15">deep blue-black, warm cream text</text>

  <rect x="782" y="348" width="334" height="262" rx="12" fill="#08141a" stroke="#1a2b33"/>
  <text x="812" y="386" fill="#f0eadc" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="17" font-weight="700">Palette</text>
  <g transform="translate(812 416)">
    <rect width="42" height="42" rx="8" fill="#08141a" stroke="#1a2b33"/>
    <rect x="52" width="42" height="42" rx="8" fill="#101d24"/>
    <rect x="104" width="42" height="42" rx="8" fill="#1a2b33"/>
    <rect x="156" width="42" height="42" rx="8" fill="#263d47"/>
    <rect x="208" width="42" height="42" rx="8" fill="#d1bda3"/>
    <rect x="260" width="42" height="42" rx="8" fill="#f0eadc"/>
  </g>
  <g transform="translate(812 478)">
    <rect width="42" height="42" rx="8" fill="#d8c8ad"/>
    <rect x="52" width="42" height="42" rx="8" fill="#9ebdbe"/>
    <rect x="104" width="42" height="42" rx="8" fill="#b8c9c8"/>
    <rect x="156" width="42" height="42" rx="8" fill="#c9b27a"/>
    <rect x="208" width="42" height="42" rx="8" fill="#d99f6b"/>
    <rect x="260" width="42" height="42" rx="8" fill="#b79ab2"/>
  </g>
  <g transform="translate(812 540)">
    <rect width="42" height="42" rx="8" fill="#97b88b"/>
    <rect x="52" width="42" height="42" rx="8" fill="#c57972"/>
    <text x="112" y="27" fill="#9f927f" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="14">restrained accents</text>
  </g>

  <rect x="82" y="638" width="1034" height="42" rx="10" fill="#08141a" stroke="#1a2b33"/>
  <text x="110" y="665" fill="#d1bda3" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="16">Text-first contrast</text>
  <circle cx="264" cy="660" r="5" fill="#9ebdbe"/>
  <text x="282" y="665" fill="#d1bda3" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="16">Silver-blue structure</text>
  <circle cx="468" cy="660" r="5" fill="#c9b27a"/>
  <text x="486" y="665" fill="#d1bda3" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="16">Warm strings</text>
  <circle cx="618" cy="660" r="5" fill="#d99f6b"/>
  <text x="636" y="665" fill="#d1bda3" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="16">Amber focus</text>
</svg>
