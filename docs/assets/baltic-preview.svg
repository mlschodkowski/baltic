      <tspan fill="#9ebdbe">Path</tspan>
      <tspan fill="#d1bda3">]:</tspan>
    </text>
    <text x="150" y="322" fill="#9f927f" font-style="italic"># Warm foreground, quiet accents.</text>
    <text y="360">
      <tspan x="150" fill="#d1bda3">path = </tspan>
